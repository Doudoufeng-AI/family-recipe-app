services:
  - type: web
    name: family-recipe-app
    runtime: node
    plan: free
    buildCommand: cd server && npm install && cd ../web && npm install && npm run build && cp -r dist ../server/web-dist
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
